<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Nairobi Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: transparent;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 30%, #16213e 60%, #0f3460 100%);
        }

        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(20px);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-text {
            color: rgba(255,255,255,0.8);
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            animation: pulse 2s ease-in-out infinite;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Bottom center hint */
        #bottom-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 10px 24px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Auto-rotate button */
        #auto-rotate-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        #auto-rotate-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.9);
        }
        #auto-rotate-btn.active {
            background: rgba(100, 180, 255, 0.15);
            border-color: rgba(100, 180, 255, 0.3);
            color: rgba(150, 210, 255, 0.9);
        }
        #auto-rotate-btn .indicator {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s ease;
        }
        #auto-rotate-btn.active .indicator {
            background: rgba(100, 200, 255, 0.8);
            box-shadow: 0 0 8px rgba(100, 200, 255, 0.5);
        }

        /* Detail card modal */
        #detail-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #detail-modal.visible {
            opacity: 1;
            visibility: visible;
        }
        #detail-modal .modal-backdrop {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        #detail-modal .modal-card {
            position: relative;
            z-index: 1;
            max-width: 480px;
            width: 90%;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        #detail-modal.visible .modal-card {
            transform: translateY(0) scale(1);
        }
        #detail-modal .modal-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }
        #detail-modal .modal-content {
            padding: 28px 32px 32px;
        }
        #detail-modal .modal-title {
            color: rgba(255,255,255,0.95);
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 0.02em;
        }
        #detail-modal .modal-desc {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.7;
            letter-spacing: 0.01em;
        }
        #detail-modal .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        #detail-modal .modal-close:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* Cursor */
        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing; }
    </style>
</head>
<body class="cursor-grab">

    <div id="canvas-container"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading gallery...</div>
    </div>

    <!-- Bottom Center Hint -->
    <div id="bottom-hint">
        Drag to rotate · Click to enlarge
    </div>

    <!-- Auto-rotate Button -->
    <button id="auto-rotate-btn">
        <span class="indicator"></span>
        Auto-rotate
    </button>

    <!-- Detail Modal -->
    <div id="detail-modal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img class="modal-image" id="modal-img" src="" alt="">
            <div class="modal-content">
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-desc" id="modal-desc"></p>
            </div>
        </div>
    </div>

    <script>
        // Gallery data
        const galleryData = [
            {
                title: "Talanta Stadium",
                desc: "At the heart of the new facility is a FIFA-standard football (soccer) stadium that will be able to seat up to 60,000 people. The new stadium, also capable of holding rugby matches, will host the opening and closing ceremonies of the 2027 Africa Cup of Nations, that will be held jointly by Kenya, Tanzania and Uganda.",
                img: "talanta stadium.jpg"
            },
            {
                title: "City Sky Scrapers",
                desc: "The towering skyline of Nairobi's central business district showcases modern architecture rising against the African sky. These glass and steel giants represent Kenya's rapid urban development and economic growth.",
                img: "city sky crapers.jpg"
            },
            {
                title: "I Love Nairobi Tower",
                desc: "An iconic landmark celebrating the vibrant spirit of Kenya's capital city. This distinctive tower stands as a testament to Nairobi's emergence as a major hub of culture, commerce, and innovation in East Africa.",
                img: "i love nairobi tower.jpg"
            },
            {
                title: "Nairobi National Park",
                desc: "A unique wildlife sanctuary located just a short drive from the city center, offering stunning views of wild animals against the backdrop of Nairobi's skyline. It is the only national park in the world bordering a capital city.",
                img: "nairobi national park.jpg"
            },
            {
                title: "Opposite Nganya Culture",
                desc: "A vibrant street scene reflecting Nairobi's dynamic matatu culture and urban lifestyle. The colorful artwork and bustling atmosphere capture the creative energy of Kenya's urban youth culture.",
                img: "opposite nganya culture.jpg"
            },
            {
                title: "Prism Towers",
                desc: "One of Nairobi's striking modern landmarks, the Prism Tower represents the city's bold architectural vision. Its sleek, angular design reflects the progressive spirit of contemporary Kenya.",
                img: "prism towers.jpg"
            }
        ];

        // Three.js setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffffff, 1.2);
        spotLight.position.set(10, 15, 20);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 2048;
        spotLight.shadow.mapSize.height = 2048;
        scene.add(spotLight);

        const fillLight = new THREE.PointLight(0x8899ff, 0.3);
        fillLight.position.set(-10, 5, 10);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xffaa88, 0.2);
        rimLight.position.set(0, -5, -10);
        scene.add(rimLight);

        // Gallery group
        const galleryGroup = new THREE.Group();
        scene.add(galleryGroup);

        const paintings = [];
        const textureLoader = new THREE.TextureLoader();
        let loadedCount = 0;
        const totalToLoad = galleryData.length;

        // Texture fitting helper (cover-fit without distortion)
        function fitTextureToPlane(texture, planeW, planeH) {
            const imgW = texture.image.width || texture.image.naturalWidth;
            const imgH = texture.image.height || texture.image.naturalHeight;
            if (!imgW || !imgH) return;
            const imgAspect = imgW / imgH;
            const planeAspect = planeW / planeH;
            texture.wrapS = THREE.ClampToEdgeWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            if (imgAspect > planeAspect) {
                const r = planeAspect / imgAspect;
                texture.repeat.set(r, 1);
                texture.offset.set((1 - r) / 2, 0);
            } else {
                const r = imgAspect / planeAspect;
                texture.repeat.set(1, r);
                texture.offset.set(0, (1 - r) / 2);
            }
            texture.needsUpdate = true;
        }

        // Create paintings arranged in a circle
        const radius = 7;
        const PLANE_W = 4.0;
        const PLANE_H = 3.0;
        galleryData.forEach((data, index) => {
            const angle = (index / galleryData.length) * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;

            // Frame
            const frameGeo = new THREE.BoxGeometry(PLANE_W + 0.4, PLANE_H + 0.4, 0.15);
            const frameMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                roughness: 0.3,
                metalness: 0.6
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            frame.castShadow = true;
            frame.receiveShadow = true;

            // Canvas backing
            const backingGeo = new THREE.PlaneGeometry(PLANE_W + 0.2, PLANE_H + 0.2);
            const backingMat = new THREE.MeshStandardMaterial({
                color: 0x0a0a15,
                roughness: 0.9
            });
            const backing = new THREE.Mesh(backingGeo, backingMat);
            backing.position.z = 0.08;
            frame.add(backing);

            // Image plane
            const imgGeo = new THREE.PlaneGeometry(PLANE_W, PLANE_H);
            const imgMat = new THREE.MeshStandardMaterial({
                color: 0x333344,
                roughness: 0.7,
                metalness: 0.1
            });
            const imgMesh = new THREE.Mesh(imgGeo, imgMat);
            imgMesh.position.z = 0.09;
            frame.add(imgMesh);

            // Position and rotate frame to face center
            frame.position.set(x, 0, z);
            frame.lookAt(0, 0, 0);

            // Store metadata
            imgMesh.userData = { 
                index: index, 
                isPainting: true,
                originalScale: 1
            };
            frame.userData = { index: index };

            galleryGroup.add(frame);
            paintings.push({ mesh: imgMesh, frame: frame, data: data });

            // Load texture
            textureLoader.load(data.img, (texture) => {
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                imgMat.map = texture;
                fitTextureToPlane(texture, PLANE_W, PLANE_H);
                imgMat.needsUpdate = true;
                loadedCount++;
                if (loadedCount >= totalToLoad) {
                    setTimeout(() => {
                        document.getElementById('loading-overlay').classList.add('hidden');
                    }, 500);
                }
            }, undefined, () => {
                loadedCount++;
                if (loadedCount >= totalToLoad) {
                    setTimeout(() => {
                        document.getElementById('loading-overlay').classList.add('hidden');
                    }, 500);
                }
            });
        });

        // Floor reflection
        const floorGeo = new THREE.PlaneGeometry(40, 40);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x0a0a15,
            roughness: 0.1,
            metalness: 0.8,
            transparent: true,
            opacity: 0.3
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -4;
        floor.receiveShadow = true;
        scene.add(floor);

        // Floating particles
        const particlesGeo = new THREE.BufferGeometry();
        const particleCount = 200;
        const posArray = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 30;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({
            size: 0.03,
            color: 0x8899cc,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particles);

        // Interaction state
        let isDragging = false;
        let previousMouseX = 0;
        let targetRotation = 0;
        let currentRotation = 0;
        let autoRotate = false;
        let autoRotateSpeed = 0.003;
        let hoveredPainting = null;

        // Mouse / touch events
        const canvas = renderer.domElement;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMouseX = e.clientX;
            document.body.classList.remove('cursor-grab');
            document.body.classList.add('cursor-grabbing');
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const delta = e.clientX - previousMouseX;
                targetRotation += delta * 0.005;
                previousMouseX = e.clientX;
            }
            checkHover(e);
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.classList.remove('cursor-grabbing');
            document.body.classList.add('cursor-grab');
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            document.body.classList.remove('cursor-grabbing');
            document.body.classList.add('cursor-grab');
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                previousMouseX = e.touches[0].clientX;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const delta = e.touches[0].clientX - previousMouseX;
                targetRotation += delta * 0.005;
                previousMouseX = e.touches[0].clientX;
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Raycaster for hover and click
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function checkHover(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(paintings.map(p => p.mesh));

            if (intersects.length > 0 && !isDragging) {
                const hit = intersects[0].object;
                if (hoveredPainting !== hit) {
                    if (hoveredPainting) {
                        gsapScale(hoveredPainting, 1);
                    }
                    hoveredPainting = hit;
                    gsapScale(hoveredPainting, 1.05);
                    canvas.style.cursor = 'pointer';
                }
            } else {
                if (hoveredPainting) {
                    gsapScale(hoveredPainting, 1);
                    hoveredPainting = null;
                    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
                }
            }
        }

        // Simple easing for scale
        function gsapScale(mesh, target) {
            const start = mesh.scale.x;
            const startTime = performance.now();
            const duration = 300;

            function animate() {
                const elapsed = performance.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3);
                const val = start + (target - start) * ease;
                mesh.scale.set(val, val, val);
                if (t < 1) requestAnimationFrame(animate);
            }
            animate();
        }

        // Click to open modal
        canvas.addEventListener('click', (e) => {
            if (isDragging) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(paintings.map(p => p.mesh));

            if (intersects.length > 0) {
                const index = intersects[0].object.userData.index;
                openModal(index);
            }
        });

        // Modal functions
        function openModal(index) {
            const data = galleryData[index];
            document.getElementById('modal-img').src = data.img;
            document.getElementById('modal-title').textContent = data.title;
            document.getElementById('modal-desc').textContent = data.desc;
            document.getElementById('detail-modal').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('visible');
        }
        window.closeModal = closeModal;

        // Auto-rotate button
        const autoBtn = document.getElementById('auto-rotate-btn');
        autoBtn.addEventListener('click', () => {
            autoRotate = !autoRotate;
            autoBtn.classList.toggle('active', autoRotate);
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Smooth rotation interpolation
            if (autoRotate && !isDragging) {
                targetRotation += autoRotateSpeed;
            }
            currentRotation += (targetRotation - currentRotation) * 0.08;
            galleryGroup.rotation.y = currentRotation;

            // Animate particles
            particles.rotation.y = time * 0.02;
            particles.rotation.x = Math.sin(time * 0.1) * 0.1;

            // Subtle floating for paintings
            paintings.forEach((p, i) => {
                p.frame.position.y = Math.sin(time + i * 1.2) * 0.15;
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
